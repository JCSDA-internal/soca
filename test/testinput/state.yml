geometry:
  num_ice_cat: 5
  num_ice_lev: 4
  num_sno_lev: 1
  mom6_input_nml: ./inputnml/input.nml

state test:
  statefile:
    read_from_file: 1
    date: &date 2018-04-15T00:00:00Z
    basename: ./INPUT/
    ocn_filename: MOM.res.nc
    ice_filename: ice_model.res.nc
    sfc_filename: sfc.res.nc
    state variables: &soca_vars [cicen, hicen, socn, tocn, ssh, hocn, sw, lhf, shf, lw, us]
    remap_filename: ./INPUT/MOM.res.nc
  norm file: 387790.8913881866
  date: *date
  StateGenerate:  # this should be "state generate" - CG
    read_from_file: 0
    date: *date
    state variables: *soca_vars
  norm generated state: 0.0
  tolerance: 1.0e-08

  statefileout:
    datadir: Data
    exp: out
    type: an
    seaice_model: cice
    read_from_file: 1
    basename: ./Data/
    ocn_filename: ocn.out.an.2018-04-15T00:00:00Z.nc
    ice_filename: cic.out.an.2018-04-15T00:00:00Z.nc
    sfc_filename: sfc.out.an.2018-04-15T00:00:00Z.nc
    date: *date
    state variables: *soca_vars
